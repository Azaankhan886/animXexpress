<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME EXPRESS — Stream. Download. Dominate.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&family=Caveat:wght@700&display=swap');

  :root {
    --black: #000000;
    --deep: #030308;
    --panel: #07070f;
    --card: #0a0a18;
    --blue: #00d4ff;
    --blue2: #0088cc;
    --blue-glow: rgba(0,212,255,0.4);
    --red: #ff2244;
    --red2: #cc0022;
    --red-glow: rgba(255,34,68,0.4);
    --white: #e8f0ff;
    --muted: #4a5568;
    --glass: rgba(0,212,255,0.04);
    --glass-border: rgba(0,212,255,0.15);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--blue);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, width 0.2s, height 0.2s;
    box-shadow: 0 0 15px var(--blue), 0 0 30px var(--blue-glow);
    mix-blend-mode: screen;
  }
  #cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1.5px solid rgba(0,212,255,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.15s ease, width 0.3s, height 0.3s, border-color 0.3s;
  }
  body:hover #cursor { opacity:1; }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9997;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9996;
    opacity: 0.4;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    z-index: 1000;
  }
  .nav-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--blue), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: rgba(232,240,255,0.6);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
    font-family: 'Share Tech Mono', monospace;
  }
  .nav-links a:hover { color: var(--blue); }
  .nav-cta {
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 8px 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: none;
    text-decoration: none;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .nav-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--blue);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: -1;
  }
  .nav-cta:hover::before { transform: translateX(0); }
  .nav-cta:hover { color: var(--black); box-shadow: 0 0 30px var(--blue-glow); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding-top: 70px;
  }

  /* Grid bg */
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100% { opacity:0.5; }
    50% { opacity:1; }
  }

  /* Radial glow blobs */
  .hero-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .blob-blue {
    width: 600px; height: 600px;
    background: rgba(0,136,204,0.12);
    top: -100px; right: -100px;
    animation: blobFloat 10s ease-in-out infinite;
  }
  .blob-red {
    width: 400px; height: 400px;
    background: rgba(255,34,68,0.08);
    bottom: -50px; left: 100px;
    animation: blobFloat 13s ease-in-out infinite reverse;
  }
  @keyframes blobFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-30px) scale(1.05); }
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 80px; height: 80px;
    pointer-events: none;
  }
  .corner-tl { top:80px; left:20px; border-top:2px solid var(--blue); border-left:2px solid var(--blue); }
  .corner-tr { top:80px; right:20px; border-top:2px solid var(--red); border-right:2px solid var(--red); }
  .corner-bl { bottom:20px; left:20px; border-bottom:2px solid var(--red); border-left:2px solid var(--red); }
  .corner-br { bottom:20px; right:20px; border-bottom:2px solid var(--blue); border-right:2px solid var(--blue); }

  .hero-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 60px;
    gap: 40px;
    position: relative;
    z-index: 2;
  }

  .hero-left {
    flex: 1;
    max-width: 600px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 6px 16px;
    margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--blue);
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease;
  }
  .hero-badge.visible { opacity:1; transform:translateY(0); }
  .badge-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .hero-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateX(-60px);
    transition: all 1s ease 0.2s;
  }
  .hero-title.visible { opacity:1; transform:translateX(0); }

  .title-line1 {
    display: block;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    color: var(--white);
    letter-spacing: 6px;
    text-shadow: 0 0 40px rgba(232,240,255,0.2);
  }
  .title-line2 {
    display: block;
    font-size: clamp(3rem, 7vw, 6rem);
    background: linear-gradient(135deg, var(--blue) 0%, #ffffff 40%, var(--red) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    filter: drop-shadow(0 0 20px var(--blue-glow));
    animation: titlePulse 4s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 20px var(--blue-glow)); }
    50% { filter: drop-shadow(0 0 40px var(--blue-glow)) drop-shadow(0 0 60px rgba(255,34,68,0.2)); }
  }

  .hero-subtitle {
    font-size: 1.1rem;
    font-weight: 300;
    color: rgba(232,240,255,0.55);
    letter-spacing: 1px;
    margin-bottom: 40px;
    line-height: 1.7;
    max-width: 440px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease 0.4s;
  }
  .hero-subtitle.visible { opacity:1; transform:translateY(0); }

  .hero-actions {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease 0.6s;
  }
  .hero-actions.visible { opacity:1; transform:translateY(0); }

  .btn-primary {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--blue2), var(--blue));
    color: var(--black);
    padding: 16px 36px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 900;
    letter-spacing: 3px;
    text-decoration: none;
    border: none;
    cursor: none;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(0,212,255,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 60px rgba(0,212,255,0.6), 0 8px 30px rgba(0,0,0,0.4);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid rgba(232,240,255,0.2);
    color: rgba(232,240,255,0.7);
    padding: 16px 28px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-decoration: none;
    cursor: none;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .btn-secondary:hover {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 20px var(--red-glow);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid rgba(0,212,255,0.1);
    opacity: 0;
    transition: opacity 0.8s ease 0.8s;
  }
  .hero-stats.visible { opacity:1; }
  .stat-item { text-align: left; }
  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--blue), var(--white));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
  }
  .stat-label {
    font-size: 0.75rem;
    color: rgba(232,240,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  /* HERO RIGHT */
  .hero-right {
    flex: 0 0 auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateX(60px) scale(0.95);
    transition: all 1.2s ease 0.3s;
  }
  .hero-right.visible { opacity:1; transform:translateX(0) scale(1); }

  .char-frame {
    position: relative;
    width: 380px;
    height: 500px;
  }

  .char-glow-ring {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.15);
    animation: ringRotate 20s linear infinite;
  }
  .char-glow-ring::after {
    content: '';
    position: absolute;
    top: 10px; left: 50%;
    width: 8px; height: 8px;
    background: var(--blue);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--blue);
    transform: translateX(-50%);
  }
  @keyframes ringRotate { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .char-glow-ring2 {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(255,34,68,0.1);
    animation: ringRotate 15s linear infinite reverse;
  }

  .char-container {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    animation: charFloat 6s ease-in-out infinite;
  }
  @keyframes charFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .char-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: top center;
    filter: drop-shadow(0 0 30px rgba(0,212,255,0.5)) drop-shadow(0 20px 40px rgba(0,0,0,0.8));
    position: relative;
    z-index: 2;
  }

  /* Fallback if no image */
  .char-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    font-family: 'Share Tech Mono', monospace;
    color: rgba(0,212,255,0.3);
    font-size: 0.75rem;
    letter-spacing: 2px;
  }

  .char-base {
    position: absolute;
    bottom: 0;
    width: 200px;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    filter: blur(4px);
    animation: baseGlow 3s ease-in-out infinite;
  }
  @keyframes baseGlow {
    0%,100% { opacity:0.6; width:160px; }
    50% { opacity:1; width:220px; }
  }

  .char-scan {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,212,255,0.03) 50%, transparent 60%);
    animation: scanMove 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 3;
  }
  @keyframes scanMove {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  /* HUD elements around character */
  .hud {
    position: absolute;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--blue);
    opacity: 0.7;
  }
  .hud-tl { top: 20px; left: -60px; }
  .hud-tr { top: 20px; right: -60px; text-align: right; }
  .hud-bl { bottom: 60px; left: -80px; }
  .hud-br { bottom: 60px; right: -80px; text-align: right; }
  .hud span { display: block; margin-bottom: 4px; }
  .hud-line {
    position: absolute;
    background: rgba(0,212,255,0.3);
  }
  .hud-tl .hud-line { width: 40px; height: 1px; top: 5px; right: -45px; }
  .hud-tr .hud-line { width: 40px; height: 1px; top: 5px; left: -45px; }

  /* SCROLL INDICATOR */
  .scroll-hint { display: none !important; }
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0.5;
    z-index: 2;
  }
  .scroll-hint-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--blue);
    text-transform: uppercase;
  }
  .scroll-arrow {
    width: 20px; height: 30px;
    border: 1px solid var(--blue);
    border-radius: 10px;
    position: relative;
  }
  .scroll-arrow::after {
    content: '';
    position: absolute;
    top: 6px; left: 50%;
    width: 4px; height: 4px;
    background: var(--blue);
    border-radius: 50%;
    transform: translateX(-50%);
    animation: scrollDrop 1.5s ease-in-out infinite;
  }
  @keyframes scrollDrop {
    0% { top: 6px; opacity:1; }
    100% { top: 18px; opacity:0; }
  }

  /* FEATURED SECTION */
  section { position: relative; }

  .featured {
    padding: 100px 60px;
    background: var(--deep);
    position: relative;
    overflow: hidden;
  }
  .featured::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue), var(--red), transparent);
  }

  .section-header {
    text-align: center;
    margin-bottom: 60px;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
  }
  .section-header.visible { opacity:1; transform:translateY(0); }

  .section-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--red);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }
  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--white), rgba(232,240,255,0.5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .anime-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--glass-border);
    overflow: hidden;
    cursor: none;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(10px);
    aspect-ratio: 3/4;
  }
  .anime-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .anime-card:nth-child(2) { transition-delay: 0.1s; }
  .anime-card:nth-child(3) { transition-delay: 0.2s; }
  .anime-card:nth-child(4) { transition-delay: 0.3s; }
  .anime-card:nth-child(5) { transition-delay: 0.4s; }
  .anime-card:nth-child(6) { transition-delay: 0.5s; }

  .anime-card:hover {
    border-color: var(--blue);
    box-shadow: 0 0 30px var(--blue-glow), inset 0 0 20px rgba(0,212,255,0.03);
    transform: translateY(-8px) scale(1.02);
  }
  .anime-card:hover .card-thumb { transform: scale(1.08); }
  .anime-card:hover .card-overlay { opacity:1; }

  .card-thumb-wrap {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .card-thumb {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0a0a20, #0d1525);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    color: rgba(0,212,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: transform 0.5s ease;
    position: relative;
  }

  /* Anime placeholder art styles */
  .card-art {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    opacity: 0.15;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.95) 100%);
    opacity: 0.7;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px;
  }
  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--white);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-meta {
    font-size: 0.68rem;
    color: var(--blue);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }
  .card-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--red);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    padding: 3px 8px;
    letter-spacing: 1px;
  }
  .card-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    width: 50px; height: 50px;
    background: rgba(0,212,255,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }
  .card-play svg { width:18px; height:18px; fill: var(--black); margin-left:3px; }
  .anime-card:hover .card-play { transform: translate(-50%,-50%) scale(1); }

  /* FEATURES ROW */
  .features {
    padding: 100px 60px;
    background: var(--black);
    position: relative;
    overflow: hid.
